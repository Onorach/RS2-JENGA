#
# Exclusion zones (MoveIt2 collision objects) matching config/ur3e_workspace.world.
# Use with motion_planning.launch when running the Gazebo simulation.
#
# All dimensions in metres. Frame: base_link (robot at world 0, 0, 1.08).
# z_base = z_world - 1.08

exclusion_zones:
  # Wheeled steel cabinet: 735 mm × 710 mm × 1080 mm
  # Model at (0.20, 0, 0), link offset (0, 0, 0.54) → centre (0.20, 0, 0.54) world
  - type: box
    id: wheeled_cabinet
    frame_id: base_link
    position: [0.20, 0.0, -0.54]
    size: [0.735, 0.71, 1.08]

  # Workspace platform on cabinet top: 320 mm × 500 mm × 12 mm
  # Centre at world (0.35, 0, 1.086)
  - type: box
    id: platform
    frame_id: base_link
    position: [0.35, 0.0, 0.006]
    size: [0.320, 0.500, 0.012]

  # Jenga tower — single bounding box (8 layers × 3 blocks)
  # For dynamic Jenga, remove via: ros2 topic pub --once /remove_exclusion_zone std_msgs/msg/String "data: jenga_tower"
  - type: box
    id: jenga_tower
    frame_id: base_link
    position: [0.35, 0.0, 0.072]   # centre
    size: [0.075, 0.075, 0.12]     # full extents
