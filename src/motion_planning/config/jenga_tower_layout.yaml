# Jenga tower layout: tune positions for your workspace (metres, degrees).
# Aligned with motion_planning/config/ur3e_workspace.yaml (platform ~ y=0.35 in base_link).
#
# pickup_cycle: true → repeat the pickup slot list (e.g. three feeders) for every block.
#               false → require one YAML entry per block (up to 18 for a six-layer tower).

frame_id: base_link
approach_z_offset: 0.06
layer_height: 0.015
block_spacing_m: 0.048
place_yaw_step_deg: 90.0

tower_origin:
  position: [0.0, 0.35, 0.025]
  rpy_deg: [180.0, 0.0, 0.0]

pickup_cycle: true
pickups:
  - position: [0.28, -0.18, 0.04]
    rpy_deg: [180.0, 0.0, 0.0]
  - position: [0.32, -0.18, 0.04]
    rpy_deg: [180.0, 0.0, 0.0]
  - position: [0.36, -0.18, 0.04]
    rpy_deg: [180.0, 0.0, 0.0]
