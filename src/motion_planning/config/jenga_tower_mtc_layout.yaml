# MTC Jenga: parametric 6 x 3 block tower (tune to your workspace / calibration).
# goal_frame: world (expected by mtc_pick_place for pick; place uses same)

layout: parametric

parametric:
  stock:
    # Two rows along y (base_link / goal frame); +x row first, then -x row (9 picks each).
    rows:
      - {x: 0.2125}
      - {x: -0.2125}
    y_centre: 0.297
    z: 0.0138
    step_along_y: 0.03694 # platform width + (block width * 0.5) / blocks per row
    blocks_per_row: 9
  tower:
    base: {x: 0.0, y: 0.297, z: 0.0138}
    # Rotate the entire tower footprint about +Z of goal_frame (yaw, in degrees).
    tower_yaw_deg: 45.0
    blocks_per_layer: 3
    layers: 6
    layer_dz: 0.0151
    slot_dx: 0.0251
  orientation_pick: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  orientation_place: {x: 0.0, y: 0.0, z: 0.707, w: 0.707}

# Example explicit mode (uncomment, set `layout: explicit` and add steps):
# layout: explicit
# blocks_per_layer: 3
# steps:
#   - pick: {x: 0.30, y: -0.20, z: 0.02}
#     place: {x: 0.35, y: 0.05, z: 0.02}
#   - pick: {x: 0.325, y: -0.20, z: 0.02}
#     place: {x: 0.35, y: 0.05, z: 0.036}
